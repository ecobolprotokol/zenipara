name: GitHub Pages Deploy

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve GitHub Pages base path
        id: pages_base
        uses: actions/github-script@v7
        with:
          script: |
            let basePath = `/${context.repo.repo}/`;

            try {
              const pages = await github.request('GET /repos/{owner}/{repo}/pages', {
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              const htmlUrl = pages.data?.html_url;
              if (htmlUrl) {
                const parsed = new URL(htmlUrl);
                const pathname = parsed.pathname || '/';
                basePath = pathname.endsWith('/') ? pathname : `${pathname}/`;
              }
            } catch (error) {
              core.warning(`Unable to fetch GitHub Pages metadata, using default base path ${basePath}. ${error}`);
            }

            core.info(`Resolved VITE_BASE_PATH=${basePath}`);
            core.setOutput('basePath', basePath);

      - name: Build production bundle
        env:
          VITE_BASE_PATH: ${{ steps.pages_base.outputs.basePath }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
        run: npm run build

      - name: Create SPA fallback
        run: cp public/404.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deduplicate Pages artifacts
        id: dedupe_artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const runId = process.env.GITHUB_RUN_ID;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const resp = await github.request('GET /repos/{owner}/{repo}/actions/runs/{run_id}/artifacts', {
              owner,
              repo,
              run_id: runId,
            });

            const artifacts = (resp.data.artifacts || []).filter(a => a.name === 'github-pages');
            if (artifacts.length > 1) {
              artifacts.sort((a, b) => a.id - b.id);
              const toDelete = artifacts.slice(0, artifacts.length - 1);
              for (const a of toDelete) {
                await github.request('DELETE /repos/{owner}/{repo}/actions/artifacts/{artifact_id}', {
                  owner,
                  repo,
                  artifact_id: a.id,
                });
                core.info(`Deleted duplicate artifact ${a.id}`);
              }
            } else {
              core.info('No duplicate github-pages artifacts found for this run');
            }

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
